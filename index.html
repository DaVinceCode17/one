<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ebebeb;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
        }
        img {
            width: 90%;
            height: 70%;
            object-fit: contain;
            margin-top: -30px;
        }
        h1 {
            font-size: 3.75em;
            color: violet;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            font-size: 2.25em;
            color: #555;
            margin-top: 0;
            text-align: center;
        }
        .bottom-btn {
            background-color: gray;
            border: none;
            border-radius: 30px;
            padding: 20px 60px;
            font-size: 2em;
            cursor: pointer;
            box-shadow: 0px 0px 10px #888888;
            margin-top: -20px;
            width: 80%;
            max-width: 400px;
            color: white;
        }
        .spacer {
            height: 20px;
        }
    </style>
</head>
<body>
    <h1>🎈 Happy 33rd Birthday teh!</h1>
    <p>Enjoy your special day!</p>
    <p style="font-size: 1.8em; color: #777;">Wishing you good health, happiness, more blessings, and more birthdays to come!</p>

    <br>

    <p>🎈🎂🎉</p>
    
    <div class="spacer"></div>
    
    <img src="hbd.jpg" alt="Happy Birthday">
    
    <div class="spacer"></div>
    
    <button class="bottom-btn" onclick="window.close()">Close</button>
</body>
</html>
