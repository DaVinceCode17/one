<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Login Page</title>
    <style>
        body {
            background-color: lightblue;
            width: 100%;
            height: 100%;
            /* Removed align-items: center; as it's for flexbox */
            padding: 10px;
            margin: 0; /* Added to remove default body margin */
            font-family: Arial, sans-serif; /* Added for consistency */
        }

        h1 {
            text-align: center;
            margin: 50px;
        }

        input {
            border-radius: 10px;
            height: 30px;
            padding-left: 15px;
            border: none;
            box-shadow: 0px 0px 10px #898787;
            margin-left: 5px;
        }

        button {
            background-color: skyblue;
            margin-bottom: 10px;
            padding: 8px;
            width: 185px;
            border: none;
            border-radius: 7px;
            box-shadow: 5px 5px 10px #888888;
            margin-left: 50px;
        }

        .box_frame {
            background-color: lightgreen;
            border-radius: 40px;
            border: 1px solid lightgreen;
            box-shadow: 0px 0px 30px #a99292;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 50%;
            margin: 0px;
            /* Added to ensure content doesn't overflow */
            overflow: auto;
            padding: 20px; /* Added for inner spacing */
            box-sizing: border-box; /* Added to include padding in width/height */
        }
        
        /* Added for better mobile responsiveness */
        @media (max-width: 768px) {
            .box_frame {
                width: 90%;
                height: 70%;
            }
            h1 {
                font-size: 1.5em;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="box_frame" style="text-align: center">
        <h1>Sign in to continue</h1>
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name"> <br><br>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="text" id="email">
        </div>

        <br><br>
        <a href="https://www.facebook.com/vincent.san.juan.saberola">
            <button>Sign in</button>
        </a>

        <br><br><br><br>
        <hr style="width: 90%; height: 10px; background-color: green; border-radius: 10px;">
        <p style="padding-left: auto; color: blue">Loading...</p>

        <br><br><br>

        <h5 style="opacity: .8;">@ Polytechnic University of the Philippines</h5>
    </div>
</body>
</html>
